<script type="application/javascript">

AOS.init();

var app = new Vue({
  el: '#app',
  data: {
    menuVisible: false,
  },
})

var fontSizeKey = 'postFontSizePx';
var tocCollapsedKey = 'tocCollapsed';
var postWidthKey = 'postWidthMode';

function clampNumber(value, min, max) {
  return Math.min(max, Math.max(min, value));
}

function initPostTools() {
  var postDetail = document.querySelector('.post-detail');
  var postContent = document.querySelector('.post-detail .post-content');
  var btnSmaller = document.getElementById('font-smaller');
  var btnLarger = document.getElementById('font-larger');
  var widthToggle = document.getElementById('width-toggle');
  var sidebarToggle = document.getElementById('sidebar-toggle');
  var sidebar = document.querySelector('.sidebar');

  if (postContent && (btnSmaller || btnLarger)) {
    var computed = window.getComputedStyle(postContent);
    var currentSize = parseFloat(computed.fontSize) || 18;
    var saved = parseFloat(localStorage.getItem(fontSizeKey));
    if (!Number.isNaN(saved)) {
      currentSize = saved;
      postContent.style.fontSize = currentSize + 'px';
    }

    if (btnSmaller) {
      btnSmaller.addEventListener('click', function() {
        currentSize = clampNumber(currentSize - 1, 16, 22);
        postContent.style.fontSize = currentSize + 'px';
        localStorage.setItem(fontSizeKey, String(currentSize));
      });
    }

    if (btnLarger) {
      btnLarger.addEventListener('click', function() {
        currentSize = clampNumber(currentSize + 1, 16, 22);
        postContent.style.fontSize = currentSize + 'px';
        localStorage.setItem(fontSizeKey, String(currentSize));
      });
    }
  }

  if (postDetail && widthToggle) {
    var mode = localStorage.getItem(postWidthKey) || 'normal';
    if (mode === 'narrow') postDetail.classList.add('width-narrow');
    if (mode === 'wide') postDetail.classList.add('width-wide');
    widthToggle.textContent = mode === 'narrow' ? '窄' : (mode === 'wide' ? '宽' : '标准');

    widthToggle.addEventListener('click', function() {
      postDetail.classList.remove('width-narrow', 'width-wide');
      mode = mode === 'normal' ? 'wide' : (mode === 'wide' ? 'narrow' : 'normal');
      if (mode === 'narrow') postDetail.classList.add('width-narrow');
      if (mode === 'wide') postDetail.classList.add('width-wide');
      widthToggle.textContent = mode === 'narrow' ? '窄' : (mode === 'wide' ? '宽' : '标准');
      localStorage.setItem(postWidthKey, mode);
    });
  }

  var tocContainer = document.getElementById('toc-container');
  var tocToggle = document.getElementById('toc-toggle');
  if (tocContainer && tocToggle) {
    var savedCollapsed = localStorage.getItem(tocCollapsedKey) === '1';
    if (savedCollapsed) {
      tocContainer.classList.add('collapsed');
      var icon = tocToggle.querySelector('i');
      if (icon) icon.className = 'fa fa-angle-down';
    }

    tocToggle.addEventListener('click', function() {
      tocContainer.classList.toggle('collapsed');
      var collapsed = tocContainer.classList.contains('collapsed');
      localStorage.setItem(tocCollapsedKey, collapsed ? '1' : '0');
      var icon = tocToggle.querySelector('i');
      if (icon) icon.className = collapsed ? 'fa fa-angle-down' : 'fa fa-angle-up';
    });
  }

  var tocHideBtn = document.getElementById('toc-hide-btn');
  var tocRestoreBtn = document.getElementById('toc-restore-btn');
  var tocHiddenKey = 'tocHiddenV2';
  if (tocHideBtn) {
    var savedHidden = localStorage.getItem(tocHiddenKey) === '1';
    if (savedHidden) {
      document.body.classList.add('toc-hidden');
      tocHideBtn.textContent = '退出沉浸';
    }

    tocHideBtn.addEventListener('click', function() {
      document.body.classList.toggle('toc-hidden');
      var hidden = document.body.classList.contains('toc-hidden');
      localStorage.setItem(tocHiddenKey, hidden ? '1' : '0');
      tocHideBtn.textContent = hidden ? '退出沉浸' : '沉浸';
    });
  }
  if (tocRestoreBtn) {
    tocRestoreBtn.addEventListener('click', function() {
      document.body.classList.remove('toc-hidden');
      localStorage.setItem(tocHiddenKey, '0');
      if (tocHideBtn) tocHideBtn.textContent = '沉浸';
    });
  }

  if (sidebar && sidebarToggle) {
    var setSidebarWidthVar = function() {
      var w = sidebar.getBoundingClientRect().width;
      if (w) document.documentElement.style.setProperty('--sidebar-width', w + 'px');
    };
    setSidebarWidthVar();
    window.addEventListener('resize', setSidebarWidthVar);

    sidebarToggle.addEventListener('click', function() {
      if (window.innerWidth <= 800) {
        if (app && typeof app.menuVisible !== 'undefined') {
          app.menuVisible = !app.menuVisible;
        }
        return;
      }
      document.body.classList.toggle('sidebar-hidden');
    });
  }
}

function initHeadingCopy() {
  var container = document.querySelector('.post-detail .post-content');
  if (!container) return;
  var headings = container.querySelectorAll('h2[id], h3[id], h4[id], h5[id], h6[id]');
  if (!headings || headings.length === 0) return;

  headings.forEach(function(h) {
    if (h.querySelector('.heading-copy-btn')) return;
    h.classList.add('has-heading-copy');
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'heading-copy-btn';
    btn.setAttribute('aria-label', 'Copy section link');
    btn.innerHTML = '<i class="fa fa-link"></i>';
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      e.stopPropagation();
      var url = window.location.origin + window.location.pathname + '#' + h.id;
      var done = function() {
        btn.classList.add('copied');
        setTimeout(function() { btn.classList.remove('copied'); }, 1200);
      };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(url).then(done).catch(function() {
          var ta = document.createElement('textarea');
          ta.value = url;
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand('copy'); } catch (err) {}
          document.body.removeChild(ta);
          done();
        });
      } else {
        var ta2 = document.createElement('textarea');
        ta2.value = url;
        document.body.appendChild(ta2);
        ta2.select();
        try { document.execCommand('copy'); } catch (err2) {}
        document.body.removeChild(ta2);
        done();
      }
    });
    h.appendChild(btn);
  });
}

// 监听滚动事件，更新阅读进度条和回到顶部按钮
window.addEventListener('scroll', function() {
  var progressBar = document.getElementById('reading-progress-bar');
  var progressPct = document.getElementById('progress-pct');
  var backToTop = document.getElementById('back-to-top');
  var winScroll = document.body.scrollTop || document.documentElement.scrollTop;
  var height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
  var scrolled = (winScroll / height) * 100;

  if (progressBar) {
    progressBar.style.width = scrolled + "%";
  }

  if (progressPct) {
    progressPct.innerText = Math.round(scrolled) + "%";
    if (winScroll > 100) {
      progressPct.classList.add('show');
    } else {
      progressPct.classList.remove('show');
    }
  }

  if (backToTop) {
    if (winScroll > 300) {
      backToTop.classList.add('show');
    } else {
      backToTop.classList.remove('show');
    }
  }

  // TOC 激活状态同步
  var tocLinks = document.querySelectorAll('.markdownIt-TOC a');
  if (tocLinks.length > 0) {
    var sections = Array.from(tocLinks).map(link => {
      var id = decodeURIComponent(link.getAttribute('href').substring(1));
      return document.getElementById(id);
    }).filter(section => section !== null);

    var currentSection = "";
    sections.forEach(section => {
      var sectionTop = section.offsetTop;
      if (winScroll >= sectionTop - 150) {
        currentSection = section.getAttribute('id');
      }
    });

    tocLinks.forEach(link => {
      link.classList.remove('active');
      if (decodeURIComponent(link.getAttribute('href').substring(1)) === currentSection) {
        link.classList.add('active');
      }
    });
  }
});

// 回到顶部点击事件
document.getElementById('back-to-top')?.addEventListener('click', function() {
  window.scrollTo({
    top: 0,
    behavior: 'smooth'
  });
});

// 代码块复制功能
document.querySelectorAll('pre').forEach(function(pre) {
  var btn = document.createElement('button');
  btn.className = 'copy-code-btn';
  btn.innerHTML = 'Copy';
  pre.appendChild(btn);

  btn.addEventListener('click', function() {
    var code = pre.querySelector('code');
    var text = code.innerText;
    var textArea = document.createElement("textarea");
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    try {
      document.execCommand('copy');
      btn.innerHTML = 'Copied!';
      setTimeout(function() {
        btn.innerHTML = 'Copy';
      }, 2000);
    } catch (err) {
      btn.innerHTML = 'Error';
    }
    document.body.removeChild(textArea);
  });
});

</script>

<script>
  // 统一初始化逻辑
  document.addEventListener('DOMContentLoaded', (event) => {
    initPostTools();
    initHeadingCopy();

    // 初始化代码高亮
    if (typeof hljs !== 'undefined') {
      hljs.highlightAll();
    }
    
    // 初始化图片放大功能
    if (typeof mediumZoom !== 'undefined') {
      mediumZoom('.post-content img, .post-feature-image', {
        margin: 24,
        background: 'rgba(15, 23, 42, 0.95)',
        scrollOffset: 0,
        zIndex: 10000,
      });
    }

    // 图片懒加载
    document.querySelectorAll('.post-content img').forEach(img => {
      img.setAttribute('loading', 'lazy');
    });

    // KaTeX 公式渲染
    if (typeof renderMathInElement !== 'undefined') {
      renderMathInElement(document.body, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "\\\\[", right: "\\\\]", display: true },
          { left: "$", right: "$", display: false },
          { left: "\\\\(", right: "\\\\)", display: false },
        ],
        throwOnError: false,
      });
    }

    var pvStoragePrefix = 'gridea:pv:';
    var normalizePvPath = function(url) {
      try {
        return new URL(url, window.location.origin).pathname;
      } catch (e) {
        return String(url || '');
      }
    };
    var getSavedPv = function(url) {
      try {
        var path = normalizePvPath(url);
        return (localStorage.getItem(pvStoragePrefix + path) || '').trim();
      } catch (e) {
        return '';
      }
    };
    var setSavedPv = function(pathname, value) {
      try {
        localStorage.setItem(pvStoragePrefix + pathname, value);
      } catch (e) {}
    };
    var fillSavedPostPvs = function() {
      var nodes = document.querySelectorAll('.js-post-pv[data-url]');
      if (!nodes || nodes.length === 0) return;
      nodes.forEach(function(el) {
        var url = el.getAttribute('data-url');
        var saved = getSavedPv(url);
        var parent = el.closest('.meta-read-count');
        if (saved) {
          el.textContent = saved;
          if (parent) parent.classList.add('show');
        } else {
          el.textContent = '--';
          if (parent) parent.classList.add('show');
        }
      });
    };
    fillSavedPostPvs();
    window.addEventListener('pageshow', fillSavedPostPvs);

    var fetchJsonp = function(url, onSuccess, onError) {
      var callback = 'BszCb_' + Math.floor(Math.random() * 1e16);
      var timeoutId;
      var cleanup = function() {
        if (timeoutId) clearTimeout(timeoutId);
        try { delete window[callback]; } catch (e) { window[callback] = undefined; }
        if (script && script.parentNode) script.parentNode.removeChild(script);
      };
      window[callback] = function(data) {
        cleanup();
        try { onSuccess && onSuccess(data); } catch (e) {}
      };
      var script = document.createElement('script');
      script.async = true;
      script.defer = true;
      script.src = url.replace('=BusuanziCallback', '=' + callback);
      script.onerror = function() {
        cleanup();
        onError && onError();
      };
      timeoutId = setTimeout(function() {
        cleanup();
        onError && onError();
      }, 7000);
      document.getElementsByTagName('head')[0].appendChild(script);
    };

    var initListPostPvFetch = function() {
      var nodes = document.querySelectorAll('.js-post-pv[data-url]');
      if (!nodes || nodes.length === 0) return;

      var pathToEls = new Map();
      nodes.forEach(function(el) {
        var url = el.getAttribute('data-url');
        var path = normalizePvPath(url);
        if (!path) return;
        if (!pathToEls.has(path)) pathToEls.set(path, []);
        pathToEls.get(path).push(el);
      });

      var queue = [];
      pathToEls.forEach(function(els, path) {
        var saved = '';
        try { saved = (localStorage.getItem(pvStoragePrefix + path) || '').trim(); } catch (e) {}
        if (saved) return;
        els.forEach(function(el) {
          el.textContent = '...';
          var parent = el.closest('.meta-read-count');
          if (parent) parent.classList.add('show');
        });
        queue.push(path);
      });

      if (queue.length === 0) return;

      var api = 'https://busuanzi.ibruce.info/busuanzi?jsonpCallback=BusuanziCallback';
      var running = 0;
      var maxConcurrency = 4;
      var pump = function() {
        while (running < maxConcurrency && queue.length > 0) {
          var path = queue.shift();
          (function(pathname) {
            running++;
            var url = api + '&url=' + encodeURIComponent(pathname);
            var done = function(value) {
              var els = pathToEls.get(pathname) || [];
              els.forEach(function(el) {
                el.textContent = value;
                var parent = el.closest('.meta-read-count');
                if (parent) parent.classList.add('show');
              });
              running--;
              setTimeout(pump, 150);
            };

            fetchJsonp(url, function(data) {
              var value = data && data.page_pv != null ? String(data.page_pv) : '';
              if (!value) value = '--';
              if (value !== '--') setSavedPv(pathname, value);
              done(value);
            }, function() {
              done('--');
            });
          })(path);
        }
      };
      pump();
    };
    initListPostPvFetch();

    var pvSource = document.getElementById('busuanzi_value_page_pv');
    var pvTargets = document.querySelectorAll('.js-page-pv-mirror');
    if (pvSource && pvTargets && pvTargets.length > 0 && typeof MutationObserver !== 'undefined') {
      var updatePv = function() {
        var value = (pvSource.textContent || '').trim();
        if (!value) value = '--';
        pvTargets.forEach(function(el) {
          el.textContent = value;
          var parent = el.closest('.meta-read-count');
          if (parent) parent.classList.toggle('show', value.length > 0);
        });
        if (value !== '--') {
          setSavedPv(window.location.pathname, value);
          fillSavedPostPvs();
        }
      };
      updatePv();
      var observer = new MutationObserver(updatePv);
      observer.observe(pvSource, { childList: true, characterData: true, subtree: true });
      setTimeout(updatePv, 1500);
    }
  });
</script>

<script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>

<!-- 打字机效果 - 滚动到区域才开始 -->
<script>
(function() {
  var text = "毛泽东思想：在对的方向，坚持长期主义，藐视一切暂时性的困难，要像建设新中国一样建设自己。";
  var element = document.getElementById('typing-text');
  if (!element) return;

  var index = 0;
  var speed = 50;
  var started = false;

  function type() {
    if (index < text.length) {
      element.textContent += text.charAt(index);
      index++;
      setTimeout(type, speed);
    }
  }

  function checkVisible() {
    if (started) return;
    var rect = element.getBoundingClientRect();
    var wh = window.innerHeight || document.documentElement.clientHeight;
    if (rect.top < wh && rect.bottom > 0) {
      started = true;
      setTimeout(type, 200);
    }
  }

  window.addEventListener('scroll', checkVisible, { passive: true });
  checkVisible();
})();
</script>

  </body>
</html>
